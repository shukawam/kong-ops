_defaults:
  kongctl:
    namespace: shukawam

control_planes:
  - ref: local-gateway
    name: local-gateway
    description: Kong Gateway running on local machine(M4 Mac).
    auth_type: pki_client_certs
    cluster_type: CLUSTER_TYPE_CONTROL_PLANE
    labels:
      environment: local
  - ref: toshogu-gateway
    name: toshogu-gateway
    description: Kong Gateway
    auth_type: pki_client_certs
    cluster_type: CLUSTER_TYPE_CONTROL_PLANE
    labels:
      environment: local
      customer: toshogu
  - ref: rose-gateway
    name: rose-gateway
    description: Kong Gateway for rose.
    auth_type: pki_client_certs
    cluster_type: CLUSTER_TYPE_CONTROL_PLANE
    labels:
      environment: local
  - ref: ilt-gateway
    name: ilt-gateway
    description: Kong Gateway for ILT.
    auth_type: pki_client_certs
    cluster_type: CLUSTER_TYPE_CONTROL_PLANE
    labels:
      environment: local
  - ref: bankong-gateway
    name: bankong-gateway
    description: Kong Gateway for BanKonG
    auth_type: pki_client_certs
    cluster_type: CLUSTER_TYPE_CONTROL_PLANE
    labels:
      environment: local
